<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AyudaYa | Ingresar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <div class="brand-mark" aria-hidden="true">
      <span class="brand-mark__ring"></span>
      <span class="brand-mark__dot"></span>
    </div>
    <p class="auth-card__eyebrow">Acceso ciudadano</p>
    <h1 class="auth-card__title">AyudaYa</h1>
    <p class="auth-card__text">Ingresa para reportar problemas de tu comunidad y dar seguimiento a las gestiones.</p>

    <form class="auth-form" action="reportes.html">
      <div class="form-field">
        <label for="usuario">Usuario</label>
        <input id="usuario" name="usuario" type="text" placeholder="Tu usuario o cédula">
      </div>

      <div class="form-field">
        <label for="clave">Contraseña</label>
        <input id="clave" name="clave" type="password" placeholder="Tu contraseña">
      </div>

      <button class="button button--primary button--full" type="submit">Ingresar</button>
    </form>

    <div class="auth-card__links">
      <a href="crear-reporte.html">Crear cuenta</a>
      <a href="index.html">Ver sistema visual</a>
    </div>
  </main>
</body>
</html>
